<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BenOS - ISO Week Viewer</title>
  <style>
    :root {
      --bg: #0b0d10;
      --panel: #11151b;
      --panel2: #0f1318;
      --text: #e6edf3;
      --muted: #9aa4af;
      --border: #243041;
      --accent: #6ee7ff;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: linear-gradient(to bottom, rgba(11,13,16,.95), rgba(11,13,16,.75));
      backdrop-filter: blur(6px);
      border-bottom: 1px solid var(--border);
    }
    .wrap { max-width: 760px; margin: 0 auto; padding: 14px; }
    .toprow { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .brand {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-right: auto;
      font-family: var(--mono);
      text-decoration: none;
    }
    .brand:visited { color: inherit; }
    .brand b { color: var(--accent); }
    .brand span { color: var(--muted); font-size: 12px; }
    .btn {
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      padding: 8px 10px;
      border-radius: 10px;
      font-family: var(--mono);
      font-size: 12px;
      cursor: pointer;
    }
    .btn:hover { border-color: #38506e; }
    .btn:active { transform: translateY(1px); }
    .yearbox {
      display: flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--border);
      background: var(--panel2);
      border-radius: 12px;
      padding: 8px 10px;
      font-family: var(--mono);
    }
    .yearbox input {
      width: 76px;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
      font: inherit;
      text-align: center;
    }
    main .wrap { padding-top: 12px; padding-bottom: 50px; }
    .summary {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: end;
      margin: 4px 2px 12px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 12px;
    }
    .summary b {
      display: block;
      color: var(--text);
      font-size: 18px;
      line-height: 1.4;
    }
    .table {
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      background: var(--panel);
    }
    .row {
      display: grid;
      grid-template-columns: 88px 1fr;
      min-height: 42px;
      border-top: 1px solid var(--border);
    }
    .row:first-child { border-top: 0; }
    .head {
      background: rgba(0,0,0,.16);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 12px;
      min-height: 36px;
    }
    .cell {
      display: flex;
      align-items: center;
      padding: 9px 12px;
      min-width: 0;
    }
    .week {
      border-right: 1px solid var(--border);
      color: var(--accent);
      font-family: var(--mono);
      font-size: 13px;
    }
    .date {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text);
    }
    .today {
      background: rgba(110,231,255,.08);
    }
    .today .date::after {
      content: "current";
      margin-left: 10px;
      border: 1px solid #2a8aa0;
      border-radius: 999px;
      padding: 2px 8px;
      color: var(--accent);
      font-size: 11px;
    }
    @media (max-width: 520px) {
      .brand { width: 100%; }
      .yearbox { flex: 1 1 auto; justify-content: space-between; }
      .row { grid-template-columns: 72px 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap toprow">
      <a class="brand" href="../../index.html" aria-label="Back to BenOS dashboard">
        <b>BenOS</b><span>iso weeks</span>
      </a>
      <button class="btn" id="prevYear" aria-label="Previous year">Prev</button>
      <div class="yearbox">
        <span>year</span>
        <input id="yearInput" inputmode="numeric" aria-label="Year" />
      </div>
      <button class="btn" id="nextYear" aria-label="Next year">Next</button>
      <button class="btn" id="thisYear">This year</button>
    </div>
  </header>

  <main>
    <div class="wrap">
      <section class="summary" aria-live="polite">
        <div><b id="title"></b><span id="range"></span></div>
        <span id="count"></span>
      </section>
      <section class="table" aria-label="ISO week Mondays">
        <div class="row head">
          <div class="cell week">week</div>
          <div class="cell date">monday</div>
        </div>
        <div id="weeks"></div>
      </section>
    </div>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const yearInput = $("yearInput");
    const weeksEl = $("weeks");
    const title = $("title");
    const range = $("range");
    const count = $("count");
    const currentYear = new Date().getUTCFullYear();
    let selectedYear = currentYear;

    function isoWeekOneMonday(year) {
      const jan4 = new Date(Date.UTC(year, 0, 4));
      const day = jan4.getUTCDay() || 7;
      jan4.setUTCDate(jan4.getUTCDate() - day + 1);
      return jan4;
    }

    function formatDate(date) {
      return date.toISOString().slice(0, 10);
    }

    function generateIsoWeeks(year) {
      const start = isoWeekOneMonday(year);
      const nextStart = isoWeekOneMonday(year + 1);
      const total = Math.round((nextStart - start) / 604800000);
      return Array.from({ length: total }, (_, index) => {
        const monday = new Date(start);
        monday.setUTCDate(start.getUTCDate() + index * 7);
        return { week: index + 1, monday: formatDate(monday) };
      });
    }

    function currentIsoWeekKey() {
      const today = new Date();
      const utcToday = new Date(Date.UTC(today.getFullYear(), today.getMonth(), today.getDate()));
      const day = utcToday.getUTCDay() || 7;
      utcToday.setUTCDate(utcToday.getUTCDate() - day + 1);
      return formatDate(utcToday);
    }

    function setYear(nextYear) {
      const parsed = Number.parseInt(nextYear, 10);
      if (!Number.isFinite(parsed) || parsed < 1 || parsed > 9999) return;
      selectedYear = parsed;
      render();
    }

    function escapeHtml(value) {
      return String(value).replace(/[<>&"]/g, (ch) => ({ "<": "&lt;", ">": "&gt;", "&": "&amp;", '"': "&quot;" }[ch]));
    }

    function render() {
      const weeks = generateIsoWeeks(selectedYear);
      const currentMonday = currentIsoWeekKey();
      yearInput.value = selectedYear;
      title.textContent = `ISO weeks for ${selectedYear}`;
      range.textContent = `${weeks[0].monday} through ${weeks[weeks.length - 1].monday}`;
      count.textContent = `${weeks.length} weeks`;
      weeksEl.innerHTML = weeks.map((item) => {
        const isCurrent = item.monday === currentMonday;
        return `<div class="row${isCurrent ? " today" : ""}"><div class="cell week">${item.week}</div><div class="cell date">${escapeHtml(item.monday)}</div></div>`;
      }).join("");
    }

    $("prevYear").addEventListener("click", () => setYear(selectedYear - 1));
    $("nextYear").addEventListener("click", () => setYear(selectedYear + 1));
    $("thisYear").addEventListener("click", () => setYear(currentYear));
    yearInput.addEventListener("change", () => setYear(yearInput.value));
    yearInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") yearInput.blur();
    });

    globalThis.generateIsoWeeks = generateIsoWeeks;
    render();
  </script>
</body>
</html>
