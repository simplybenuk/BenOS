<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BenOS • Journey Board</title>
  <style>
    :root{--bg:#0b0d10;--panel:#11151b;--panel2:#0f1318;--text:#e6edf3;--muted:#9aa4af;--border:#243041;--accent:#6ee7ff;--danger:#ff6b6b;--ok:#7ee787;--mono:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;--sans:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);overflow:hidden}
    header{height:62px;display:flex;gap:8px;align-items:center;padding:10px 12px;border-bottom:1px solid var(--border);background:rgba(11,13,16,.97);position:relative;z-index:2;flex-wrap:wrap}
    .brand{display:flex;align-items:baseline;gap:10px;margin-right:10px;font-family:var(--mono);text-decoration:none}.brand b{color:var(--accent)}.brand span{color:var(--muted);font-size:12px}.brand:visited{color:inherit}
    button,.file{border:1px solid var(--border);background:var(--panel);color:var(--text);padding:8px 10px;border-radius:10px;font-family:var(--mono);font-size:12px;cursor:pointer;white-space:nowrap}button:hover,.file:hover{border-color:#38506e}.primary{border-color:#2a8aa0}.danger{border-color:#7a2f2f;color:#ffd1d1}.active{border-color:var(--accent);color:var(--accent)} input[type=file]{display:none}
    .hint{font-family:var(--mono);font-size:11px;color:var(--muted);margin-left:auto}
    #viewport{position:relative;height:calc(100vh - 62px);overflow:auto;background:radial-gradient(circle at 1px 1px,#1c2530 1px,transparent 0);background-size:24px 24px}
    #surface{position:relative;width:5000px;height:3200px}
    svg{position:absolute;inset:0;width:5000px;height:3200px;pointer-events:none;overflow:visible}.link{stroke:#9aa4af;stroke-width:2;fill:none;marker-end:url(#arrow)}.link-label{fill:#c8d1db;font:12px var(--sans);paint-order:stroke;stroke:var(--bg);stroke-width:6px;stroke-linejoin:round}
    .node{position:absolute;border:1px solid var(--border);background:var(--panel);border-radius:12px;box-shadow:0 8px 22px rgba(0,0,0,.28);touch-action:none;overflow:hidden}.node.selected{outline:2px solid var(--accent);outline-offset:2px}
    .bar{height:34px;display:flex;align-items:center;gap:5px;padding:5px 7px;border-bottom:1px solid var(--border);color:var(--muted);font:11px var(--mono);cursor:grab;background:rgba(0,0,0,.1)}.bar:active{cursor:grabbing}.bar .name{margin-right:auto;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:190px}.bar button{padding:3px 7px;border-radius:7px;font-size:11px}
    .image img{display:block;height:auto;user-select:none;pointer-events:none}.note{width:260px}.note textarea{display:block;width:100%;height:108px;resize:both;min-width:200px;min-height:72px;border:0;outline:0;background:transparent;color:var(--text);font:13px/1.42 var(--mono);padding:10px}
    .empty{position:absolute;left:32px;top:34px;border:1px dashed #38506e;border-radius:16px;padding:22px 26px;color:var(--muted);font:13px/1.6 var(--mono);pointer-events:none}.empty strong{color:var(--text)}
    .toast{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);background:rgba(17,21,27,.96);border:1px solid var(--border);padding:10px 13px;border-radius:999px;font:12px var(--mono);color:var(--text);opacity:0;pointer-events:none;transition:.16s;z-index:5}.toast.show{opacity:1}
    @media(max-width:900px){header{height:auto}.hint{display:none}#viewport{height:calc(100vh - 104px)}}
  </style>
</head>
<body>
<header>
  <a class="brand" href="../../index.html" aria-label="Back to BenOS"><b>BenOS</b><span>journey board</span></a>
  <label class="file">+ Screenshot<input id="file" type="file" accept="image/*" multiple /></label>
  <button id="textBtn">+ Text</button>
  <button id="connectBtn" title="Select two items then connect them">Connect</button>
  <button id="exportBtn" class="primary">Export PNG @2×</button>
  <button id="clearBtn" class="danger">Nuke</button>
  <span class="hint">paste / upload screenshots • drag headers • Shift-click two nodes to connect • autosaves locally</span>
</header>
<div id="viewport"><div id="surface">
  <svg aria-hidden="true"><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0 0L0 6L9 3z" fill="#9aa4af" /></marker></defs><g id="links"></g></svg>
  <div id="nodes"></div><div id="empty" class="empty"><strong>Drop a journey in here.</strong><br>Paste or upload screenshots, add text, connect the steps,<br>then export a readable PNG for review.</div>
</div></div>
<div id="toast" class="toast"></div>
<script>
(() => {
  const DB = "benos_journey_board", STORE = "boards", BOARD = "default";
  const $ = id => document.getElementById(id);
  const nodesEl = $("nodes"), linksEl = $("links"), viewport = $("viewport"), surface = $("surface"), toast = $("toast");
  let state = { nodes: [], links: [] }, selected = [], drag = null, savingTimer = null;

  function uid(){ return crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(16).slice(2) + Date.now().toString(16); }
  function show(msg){ toast.textContent = msg; toast.classList.add("show"); clearTimeout(show.t); show.t = setTimeout(() => toast.classList.remove("show"), 1100); }
  function esc(s){ return String(s).replace(/[<>&"]/g, c => ({"<":"&lt;",">":"&gt;","&":"&amp;",'"':"&quot;"}[c])); }
  function openDB(){ return new Promise((resolve,reject) => { const r = indexedDB.open(DB,1); r.onupgradeneeded = () => r.result.createObjectStore(STORE); r.onsuccess = () => resolve(r.result); r.onerror = () => reject(r.error); }); }
  async function load(){ const db = await openDB(); return new Promise((resolve,reject) => { const r = db.transaction(STORE).objectStore(STORE).get(BOARD); r.onsuccess = () => resolve(r.result || {nodes:[],links:[]}); r.onerror = () => reject(r.error); }); }
  async function persist(){ const db = await openDB(); return new Promise((resolve,reject) => { const tx = db.transaction(STORE,"readwrite"); tx.objectStore(STORE).put(state,BOARD); tx.oncomplete=resolve; tx.onerror=()=>reject(tx.error); }); }
  function queueSave(){ clearTimeout(savingTimer); savingTimer=setTimeout(() => persist().catch(() => show("Could not save board")), 80); }
  function newPosition(){ const i = state.nodes.length; return { x: 110 + (i % 5) * 70, y: 100 + (i % 6) * 50 }; }
  function readImage(file){ return new Promise((resolve,reject) => { const r = new FileReader(); r.onload = () => { const img = new Image(); img.onload = () => resolve({data:r.result,naturalW:img.naturalWidth,naturalH:img.naturalHeight}); img.onerror=reject; img.src=r.result; }; r.onerror=reject; r.readAsDataURL(file); }); }
  async function addImage(file){ const image = await readImage(file), pos = newPosition(); const w = Math.max(220, Math.min(440, image.naturalW)); state.nodes.push({id:uid(), type:"image", name:file.name || "pasted screenshot", ...pos, w, ...image}); queueSave(); render(); }
  function addNote(){ const pos = newPosition(); const node={id:uid(),type:"note",text:"",...pos}; state.nodes.push(node); selected=[node.id]; queueSave(); render(); requestAnimationFrame(() => document.querySelector(`[data-id="${node.id}"] textarea`).focus()); }
  function find(id){ return state.nodes.find(n => n.id === id); }
  function nodeElement(id){ return nodesEl.querySelector(`[data-id="${id}"]`); }
  function dims(node){ const el=nodeElement(node.id); return {w: el?.offsetWidth || (node.type === "image" ? node.w : 260), h: el?.offsetHeight || (node.type === "image" ? node.w*node.naturalH/node.naturalW+34 : 143)}; }
  function centre(node){ const d=dims(node); return {x:node.x+d.w/2,y:node.y+d.h/2}; }
  function linePath(a,b){ const dx = Math.max(55, Math.abs(b.x-a.x)*.42); return `M ${a.x} ${a.y} C ${a.x+dx} ${a.y}, ${b.x-dx} ${b.y}, ${b.x} ${b.y}`; }
  function drawLinks(){ linksEl.innerHTML=""; for(const link of state.links){ const from=find(link.from),to=find(link.to); if(!from||!to) continue; const a=centre(from),b=centre(to), path=document.createElementNS("http://www.w3.org/2000/svg","path"); path.setAttribute("class","link"); path.setAttribute("d",linePath(a,b)); linksEl.appendChild(path); if(link.label){ const label=document.createElementNS("http://www.w3.org/2000/svg","text"); label.setAttribute("class","link-label"); label.setAttribute("x", String((a.x+b.x)/2)); label.setAttribute("y", String((a.y+b.y)/2-9)); label.setAttribute("text-anchor","middle"); label.textContent=link.label; linksEl.appendChild(label); } } }
  function render(){ nodesEl.innerHTML=""; $("empty").style.display=state.nodes.length?"none":"block"; for(const node of state.nodes){ const el=document.createElement("article"); el.dataset.id=node.id; el.className=`node ${node.type}${selected.includes(node.id)?" selected":""}`; el.style.left=`${node.x}px`; el.style.top=`${node.y}px`; const controls = node.type === "image" ? `<button data-act="smaller">−</button><button data-act="larger">+</button>` : ""; el.innerHTML=`<div class="bar"><span class="name">${esc(node.type === "image" ? node.name : "text note")}</span>${controls}<button data-act="delete">×</button></div>`; if(node.type === "image"){ const img=document.createElement("img"); img.src=node.data; img.alt=node.name; img.style.width=`${node.w}px`; el.appendChild(img); } else { const text=document.createElement("textarea"); text.placeholder="Label, observation, decision…"; text.value=node.text; text.addEventListener("input",()=>{node.text=text.value;queueSave();}); el.appendChild(text); } nodesEl.appendChild(el); } drawLinks(); }
  function select(id, multi){ if(multi){ selected = selected.includes(id) ? selected.filter(x=>x!==id) : [...selected,id]; } else selected=[id]; render(); }
  function point(e){ const rect=surface.getBoundingClientRect(); return {x:e.clientX-rect.left,y:e.clientY-rect.top}; }
  nodesEl.addEventListener("pointerdown", e => { const el=e.target.closest(".node"), bar=e.target.closest(".bar"); if(!el) return; const id=el.dataset.id, node=find(id); if(!selected.includes(id)) select(id,e.shiftKey); if(!bar || e.target.closest("button")) return; const p=point(e); drag={id,dx:p.x-node.x,dy:p.y-node.y,pointerId:e.pointerId}; el.setPointerCapture(e.pointerId); });
  nodesEl.addEventListener("pointermove", e => { if(!drag || e.pointerId!==drag.pointerId) return; const node=find(drag.id), p=point(e); node.x=Math.max(0,p.x-drag.dx); node.y=Math.max(0,p.y-drag.dy); elMove(node); queueSave(); drawLinks(); });
  nodesEl.addEventListener("pointerup", () => { drag=null; });
  function elMove(node){ const el=nodeElement(node.id); if(el){el.style.left=`${node.x}px`;el.style.top=`${node.y}px`;} }
  nodesEl.addEventListener("click", e => { const el=e.target.closest(".node"); if(!el) return; const node=find(el.dataset.id), action=e.target.closest("button")?.dataset.act; if(!action){ if(!e.target.matches("textarea")) select(node.id,e.shiftKey); return; } if(action==="delete"){ state.nodes=state.nodes.filter(n=>n.id!==node.id); state.links=state.links.filter(l=>l.from!==node.id&&l.to!==node.id); selected=selected.filter(id=>id!==node.id); } if(action==="smaller") node.w=Math.max(160,node.w-60); if(action==="larger") node.w=Math.min(1000,node.w+60); queueSave(); render(); });
  surface.addEventListener("click", e => { if(e.target===surface || e.target.tagName.toLowerCase()==="svg") { selected=[]; render(); } });
  $("connectBtn").addEventListener("click", () => { if(selected.length!==2) return show("Shift-click exactly two items first"); const label=prompt("Connector label (optional)","") || ""; state.links.push({id:uid(),from:selected[0],to:selected[1],label}); selected=[]; queueSave(); render(); });
  $("textBtn").addEventListener("click", addNote);
  $("file").addEventListener("change", async e => { for(const file of [...e.target.files]) await addImage(file); e.target.value=""; show("Screenshot added"); });
  document.addEventListener("paste", async e => { if(e.target.matches("textarea")) return; const files=[...(e.clipboardData?.items||[])].filter(i=>i.kind==="file"&&i.type.startsWith("image/")).map(i=>i.getAsFile()); for(const file of files) await addImage(file); if(files.length){ e.preventDefault(); show(`${files.length} screenshot${files.length===1?"":"s"} pasted`); } });
  $("clearBtn").addEventListener("click", async () => { if(!confirm("Delete this entire journey board? No undo.")) return; state={nodes:[],links:[]};selected=[];await persist();render();show("Board nuked"); });
  document.addEventListener("keydown", e => { if(e.key==="Escape"){selected=[];render();} if((e.key==="Delete"||e.key==="Backspace") && !e.target.matches("textarea") && selected.length){ state.nodes=state.nodes.filter(n=>!selected.includes(n.id)); state.links=state.links.filter(l=>!selected.includes(l.from)&&!selected.includes(l.to)); selected=[];queueSave();render(); } });
  function wrapText(ctx,text,maxWidth){ const lines=[]; for(const para of String(text||"").split("\n")){ let line=""; for(const word of para.split(/\s+/)){ const next=line?`${line} ${word}`:word; if(line && ctx.measureText(next).width>maxWidth){lines.push(line);line=word;} else line=next; } lines.push(line); } return lines; }
  function roundRect(ctx,x,y,w,h,r){ ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath(); }
  function arrow(ctx,a,b){ const dx=Math.max(55,Math.abs(b.x-a.x)*.42), cp1={x:a.x+dx,y:a.y}, cp2={x:b.x-dx,y:b.y}; ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.bezierCurveTo(cp1.x,cp1.y,cp2.x,cp2.y,b.x,b.y);ctx.stroke(); const angle=Math.atan2(b.y-cp2.y,b.x-cp2.x); ctx.beginPath();ctx.moveTo(b.x,b.y);ctx.lineTo(b.x-11*Math.cos(angle-.38),b.y-11*Math.sin(angle-.38));ctx.lineTo(b.x-11*Math.cos(angle+.38),b.y-11*Math.sin(angle+.38));ctx.closePath();ctx.fill(); }
  async function exportPNG(){ if(!state.nodes.length) return show("Add something first"); const margin=55, scale=2; const boxes=state.nodes.map(n=>({n,d:dims(n)})); const minX=Math.min(...boxes.map(x=>x.n.x))-margin, minY=Math.min(...boxes.map(x=>x.n.y))-margin, maxX=Math.max(...boxes.map(x=>x.n.x+x.d.w))+margin, maxY=Math.max(...boxes.map(x=>x.n.y+x.d.h))+margin; const canvas=document.createElement("canvas"); canvas.width=Math.ceil((maxX-minX)*scale);canvas.height=Math.ceil((maxY-minY)*scale); const ctx=canvas.getContext("2d");ctx.scale(scale,scale);ctx.translate(-minX,-minY);ctx.fillStyle="#fbfaf7";ctx.fillRect(minX,minY,maxX-minX,maxY-minY); ctx.strokeStyle="#8793a0";ctx.fillStyle="#8793a0";ctx.lineWidth=2; for(const l of state.links){const a=find(l.from),b=find(l.to);if(!a||!b)continue; const ca=centre(a),cb=centre(b);arrow(ctx,ca,cb); if(l.label){ctx.font="13px Arial";const x=(ca.x+cb.x)/2,y=(ca.y+cb.y)/2-10,w=ctx.measureText(l.label).width;ctx.fillStyle="#fbfaf7";ctx.fillRect(x-w/2-5,y-14,w+10,19);ctx.fillStyle="#26323d";ctx.textAlign="center";ctx.fillText(l.label,x,y);ctx.textAlign="start";ctx.fillStyle="#8793a0";} }
    for(const {n,d} of boxes){ ctx.fillStyle="#ffffff";ctx.strokeStyle="#d7d3ca";ctx.lineWidth=1;roundRect(ctx,n.x,n.y,d.w,d.h,10);ctx.fill();ctx.stroke();ctx.fillStyle="#f4f2ed";roundRect(ctx,n.x,n.y,d.w,34,10);ctx.fill();ctx.fillRect(n.x,n.y+24,d.w,10);ctx.fillStyle="#6b7280";ctx.font="12px monospace";ctx.fillText(n.type==="image"?n.name:"text note",n.x+10,n.y+22); if(n.type==="image"){ const img=new Image(); await new Promise(resolve=>{img.onload=resolve;img.onerror=resolve;img.src=n.data;});ctx.drawImage(img,n.x,n.y+34,n.w,d.h-34); } else {ctx.fillStyle="#1d2935";ctx.font="13px monospace";const lines=wrapText(ctx,n.text,d.w-20);lines.slice(0,8).forEach((line,i)=>ctx.fillText(line,n.x+10,n.y+56+i*18));} }
    canvas.toBlob(blob=>{ if(!blob)return show("Export failed"); const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`journey-board-${new Date().toISOString().slice(0,10)}.png`;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1500);show("High-res PNG exported"); },"image/png"); }
  $("exportBtn").addEventListener("click", exportPNG);
  load().then(data => { state = data && Array.isArray(data.nodes) ? data : {nodes:[],links:[]}; render(); }).catch(() => {render();show("Could not load saved board");});
})();
</script>
</body>
</html>
