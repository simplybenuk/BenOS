<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BenOS • Journey Board</title>
  <style>
    :root{--bg:#0b0d10;--panel:#11151b;--panel2:#0f1318;--text:#e6edf3;--muted:#9aa4af;--border:#243041;--accent:#6ee7ff;--danger:#ff6b6b;--mono:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;--sans:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);overflow:hidden}
    header{height:58px;display:flex;gap:10px;align-items:center;padding:10px 12px;border-bottom:1px solid var(--border);background:rgba(11,13,16,.95)}
    .brand{display:flex;align-items:baseline;gap:10px;margin-right:auto;font-family:var(--mono);text-decoration:none}.brand b{color:var(--accent)}.brand span{color:var(--muted);font-size:12px}.brand:visited{color:inherit}
    button,label.file{border:1px solid var(--border);background:var(--panel);color:var(--text);padding:8px 10px;border-radius:10px;font-family:var(--mono);font-size:12px;cursor:pointer}button:hover,label.file:hover{border-color:#38506e}.danger{border-color:#7a2f2f;color:#ffd1d1}.primary{border-color:#2a8aa0}
    input[type=file]{display:none}.hint{font-family:var(--mono);font-size:12px;color:var(--muted)}
    #board{position:relative;height:calc(100vh - 58px);overflow:auto;background:radial-gradient(circle at 1px 1px,#1a2533 1px,transparent 0);background-size:24px 24px}
    #canvas{position:relative;width:3200px;height:2000px;transform-origin:0 0}
    svg{position:absolute;inset:0;width:3200px;height:2000px;pointer-events:none;overflow:visible}.link{stroke:#9aa4af;stroke-width:2;fill:none;marker-end:url(#arrow)}
    .node{position:absolute;border:1px solid var(--border);background:var(--panel);border-radius:12px;box-shadow:0 8px 22px rgba(0,0,0,.25);min-width:120px;touch-action:none}.node.selected{outline:2px solid var(--accent)}
    .node .bar{display:flex;gap:6px;align-items:center;padding:6px 8px;border-bottom:1px solid var(--border);font-family:var(--mono);font-size:11px;color:var(--muted);cursor:grab}.node .bar span{margin-right:auto}.node button{padding:3px 7px;font-size:11px;border-radius:8px}
    .shot img{display:block;max-width:420px;max-height:300px;border-radius:0 0 12px 12px}.text .body{min-width:180px;min-height:70px;padding:10px;white-space:pre-wrap;outline:0;font-family:var(--mono);font-size:13px;line-height:1.35}.text .body:empty:before{content:"Type note…";color:var(--muted)}
    .toast{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);background:rgba(17,21,27,.95);border:1px solid var(--border);padding:10px 12px;border-radius:999px;font-family:var(--mono);font-size:12px;color:var(--text);opacity:0;pointer-events:none;transition:.15s}.toast.show{opacity:1}
  </style>
</head>
<body>
<header>
  <a class="brand" href="../../index.html"><b>BenOS</b><span>journey board</span></a>
  <label class="file">+ Screenshot<input id="file" type="file" accept="image/*" multiple></label>
  <button id="textBtn">+ Text</button><button id="linkBtn">Connect</button><button id="exportBtn" class="primary">Export SVG</button><button id="clearBtn" class="danger">Nuke</button>
  <span class="hint">drag items • select 2 then Connect • paste screenshots • autosaves local</span>
</header>
<div id="board"><div id="canvas"><svg id="svg"><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#9aa4af"/></marker></defs><g id="links"></g></svg><div id="nodes"></div></div></div>
<div class="toast" id="toast"></div>
<script>
const KEY="benos:journey-board:v1";const $=id=>document.getElementById(id);const nodesEl=$("nodes"),linksEl=$("links"),toast=$("toast");let state=load();let selected=[];let drag=null;
function uid(){return Math.random().toString(16).slice(2)+Date.now().toString(16)}function show(m){toast.textContent=m;toast.classList.add("show");clearTimeout(show.t);show.t=setTimeout(()=>toast.classList.remove("show"),900)}
function load(){try{return JSON.parse(localStorage.getItem(KEY)||"{}")||{nodes:[],links:[]}}catch{return{nodes:[],links:[]}}}function save(){localStorage.setItem(KEY,JSON.stringify(state))}
function addText(){state.nodes.push({id:uid(),type:"text",x:160,y:120,w:220,h:110,text:""});save();render()}function addImage(data,name){state.nodes.push({id:uid(),type:"image",x:180+state.nodes.length*28,y:130+state.nodes.length*28,name:name||"screenshot",data});save();render()}
function nodeMid(n){const el=document.querySelector(`[data-id="${n.id}"]`);return{x:n.x+(el?.offsetWidth||220)/2,y:n.y+(el?.offsetHeight||140)/2}}
function render(){nodesEl.innerHTML="";for(const n of state.nodes){const el=document.createElement("div");el.className=`node ${n.type==="image"?"shot":"text"}${selected.includes(n.id)?" selected":""}`;el.dataset.id=n.id;el.style.left=n.x+"px";el.style.top=n.y+"px";el.innerHTML=`<div class="bar"><span>${esc(n.type==="image"?n.name:"text")}</span><button data-act="dup">dup</button><button data-act="del">del</button></div>`;if(n.type==="image"){const img=document.createElement("img");img.src=n.data;el.appendChild(img)}else{const body=document.createElement("div");body.className="body";body.contentEditable="true";body.textContent=n.text||"";body.addEventListener("input",()=>{n.text=body.textContent;save()});el.appendChild(body)}nodesEl.appendChild(el)}drawLinks()}
function drawLinks(){linksEl.innerHTML="";for(const l of state.links){const a=state.nodes.find(n=>n.id===l.from),b=state.nodes.find(n=>n.id===l.to);if(!a||!b)continue;const A=nodeMid(a),B=nodeMid(b);const p=document.createElementNS("http://www.w3.org/2000/svg","path");const dx=Math.max(80,Math.abs(B.x-A.x)/2);p.setAttribute("d",`M ${A.x} ${A.y} C ${A.x+dx} ${A.y}, ${B.x-dx} ${B.y}, ${B.x} ${B.y}`);p.setAttribute("class","link");linksEl.appendChild(p)}}
function esc(s){return String(s).replace(/[<>&"]/g,ch=>({"<":"&lt;",">":"&gt;","&":"&amp;",'"':"&quot;"}[ch]))}
function select(id,add){selected=add?[...new Set([...selected,id])]:[id];render()}
nodesEl.addEventListener("pointerdown",e=>{const el=e.target.closest(".node");if(!el)return;const n=state.nodes.find(x=>x.id===el.dataset.id);if(!n)return;if(!selected.includes(n.id))select(n.id,e.shiftKey);if(e.target.closest("button")||e.target.classList.contains("body"))return;drag={id:n.id,dx:e.clientX-n.x,dy:e.clientY-n.y};el.setPointerCapture(e.pointerId)});
nodesEl.addEventListener("pointermove",e=>{if(!drag)return;const n=state.nodes.find(x=>x.id===drag.id);n.x=e.clientX-drag.dx;n.y=e.clientY-drag.dy;save();render()});nodesEl.addEventListener("pointerup",()=>drag=null);
nodesEl.addEventListener("click",e=>{const btn=e.target.closest("button"),el=e.target.closest(".node");if(!el)return;const id=el.dataset.id;if(!btn){select(id,e.shiftKey);return}const act=btn.dataset.act;if(act==="del"){state.nodes=state.nodes.filter(n=>n.id!==id);state.links=state.links.filter(l=>l.from!==id&&l.to!==id)}if(act==="dup"){const n=state.nodes.find(x=>x.id===id);state.nodes.push({...n,id:uid(),x:n.x+40,y:n.y+40})}save();render()});
$("textBtn").onclick=addText;$("linkBtn").onclick=()=>{if(selected.length!==2)return show("Select exactly 2 items");state.links.push({from:selected[0],to:selected[1]});selected=[];save();render()};$("clearBtn").onclick=()=>{if(confirm("Delete board?")){state={nodes:[],links:[]};save();render()}};
$("file").onchange=async e=>{for(const f of e.target.files){const r=new FileReader();r.onload=()=>addImage(r.result,f.name);r.readAsDataURL(f)}e.target.value=""};
document.addEventListener("paste",e=>{for(const it of e.clipboardData?.items||[]){if(it.kind==="file"&&it.type.startsWith("image/")){const f=it.getAsFile();const r=new FileReader();r.onload=()=>addImage(r.result,"pasted screenshot");r.readAsDataURL(f)}}});
$("exportBtn").onclick=()=>{const html=`<svg xmlns="http://www.w3.org/2000/svg" width="3200" height="2000"><style>.box{fill:#11151b;stroke:#243041}.txt{fill:#e6edf3;font:14px monospace}.muted{fill:#9aa4af;font:12px monospace}.link{stroke:#9aa4af;stroke-width:2;fill:none}</style>${linksEl.innerHTML}${state.nodes.map(n=>n.type==="text"?`<rect class="box" x="${n.x}" y="${n.y}" width="240" height="120" rx="12"/><text class="txt" x="${n.x+12}" y="${n.y+28}">${esc(n.text||"Text")}</text>`:`<image href="${n.data}" x="${n.x}" y="${n.y}" width="420"/>`).join("")}</svg>`;const blob=new Blob([html],{type:"image/svg+xml"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="journey-board.svg";a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)};
render();
</script>
</body>
</html>
