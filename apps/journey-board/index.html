<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BenOS • Journey Board</title>
  <style>
    :root{--bg:#0b0d10;--panel:#11151b;--panel2:#0f1318;--text:#e6edf3;--muted:#9aa4af;--border:#243041;--accent:#6ee7ff;--danger:#ff6b6b;--mono:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace;--sans:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);overflow:hidden}
    header{min-height:62px;display:flex;gap:8px;align-items:center;padding:10px 12px;border-bottom:1px solid var(--border);background:rgba(11,13,16,.97);position:relative;z-index:2;flex-wrap:wrap}
    .brand{display:flex;align-items:baseline;gap:10px;margin-right:6px;font-family:var(--mono);text-decoration:none}.brand b{color:var(--accent)}.brand span{color:var(--muted);font-size:12px}.brand:visited{color:inherit}
    button,.file,select,input.board-name{height:36px;border:1px solid var(--border);background:var(--panel);color:var(--text);padding:8px 10px;border-radius:10px;font-family:var(--mono);font-size:12px}button,.file{cursor:pointer;white-space:nowrap}button:hover,.file:hover{border-color:#38506e}.primary{border-color:#2a8aa0}.danger{border-color:#7a2f2f;color:#ffd1d1}input[type=file]{display:none}
    select{max-width:180px}input.board-name{width:185px;background:var(--panel2)}.divider{height:26px;border-left:1px solid var(--border);margin:0 2px}.zoom{display:flex;align-items:center;gap:4px}.zoom button{padding:6px 10px}.zoom span{min-width:48px;text-align:center;font:12px var(--mono);color:var(--muted)}
    .hint{font-family:var(--mono);font-size:11px;color:var(--muted);margin-left:auto}
    #viewport{position:relative;height:calc(100vh - 62px);overflow:auto;cursor:grab;background:radial-gradient(circle at 1px 1px,#1c2530 1px,transparent 0);background-size:24px 24px}
    #viewport.panning{cursor:grabbing;user-select:none}
    #viewport.panning *{cursor:grabbing!important}
    #stage{position:relative;width:5000px;height:3200px}
    #surface{position:absolute;left:0;top:0;width:5000px;height:3200px;transform-origin:0 0}
    svg{position:absolute;inset:0;width:5000px;height:3200px;pointer-events:none;overflow:visible}.link{stroke:#9aa4af;stroke-width:2;fill:none;marker-end:url(#arrow)}.link-label{fill:#c8d1db;font:12px var(--sans);paint-order:stroke;stroke:var(--bg);stroke-width:6px;stroke-linejoin:round}
    .node{position:absolute;border:1px solid var(--border);background:var(--panel);border-radius:12px;box-shadow:0 8px 22px rgba(0,0,0,.28);touch-action:none;overflow:hidden}.node.selected{outline:2px solid var(--accent);outline-offset:2px}
    .bar{height:34px;display:flex;align-items:center;gap:5px;padding:5px 7px;border-bottom:1px solid var(--border);color:var(--muted);font:11px var(--mono);cursor:grab;background:rgba(0,0,0,.1)}.bar:active{cursor:grabbing}.bar .name{margin-right:auto;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:190px}.bar button{height:auto;padding:3px 7px;border-radius:7px;font-size:11px}
    .image img{display:block;height:auto;user-select:none;pointer-events:none}.note{width:260px;background:var(--note-bg,var(--panel));border-color:var(--note-border,var(--border))}.note .bar{background:var(--note-bar,rgba(0,0,0,.1));color:var(--note-meta,var(--muted));border-bottom-color:var(--note-border,var(--border))}.note textarea{display:block;width:100%;height:108px;resize:both;min-width:200px;min-height:72px;border:0;outline:0;background:transparent;color:var(--note-text,var(--text));font:13px/1.42 var(--mono);padding:10px}.note textarea::placeholder{color:var(--note-placeholder,var(--muted))}.swatches{display:flex;gap:3px;align-items:center}.bar .swatch{width:17px;height:17px;padding:0;border-radius:999px;border-color:rgba(0,0,0,.28);box-shadow:inset 0 0 0 1px rgba(255,255,255,.18)}.bar .swatch.active{outline:2px solid var(--accent);outline-offset:1px}
    .empty{position:absolute;left:32px;top:34px;border:1px dashed #38506e;border-radius:16px;padding:22px 26px;color:var(--muted);font:13px/1.6 var(--mono);pointer-events:none}.empty strong{color:var(--text)}
    .toast{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);background:rgba(17,21,27,.96);border:1px solid var(--border);padding:10px 13px;border-radius:999px;font:12px var(--mono);color:var(--text);opacity:0;pointer-events:none;transition:.16s;z-index:5}.toast.show{opacity:1}
    @media(max-width:1100px){.hint{display:none}} @media(max-width:750px){#viewport{height:calc(100vh - 114px)}}
  </style>
</head>
<body>
<header>
  <a class="brand" href="../../index.html" aria-label="Back to BenOS"><b>BenOS</b><span>journey board</span></a>
  <select id="journeySelect" aria-label="Saved journeys"></select>
  <input id="boardName" class="board-name" aria-label="Journey name" placeholder="Journey name" />
  <button id="newBtn">New</button><button id="duplicateBtn">Duplicate</button><button id="deleteJourneyBtn" class="danger">Delete</button>
  <span class="divider"></span>
  <label class="file">+ Screenshot<input id="file" type="file" accept="image/*" multiple /></label>
  <button id="textBtn">+ Text</button><button id="connectBtn" title="Select two items then connect them">Connect</button>
  <span class="divider"></span>
  <div class="zoom"><button id="zoomOut" aria-label="Zoom out">−</button><span id="zoomValue">100%</span><button id="zoomIn" aria-label="Zoom in">+</button><button id="fitBtn">Fit</button></div>
  <button id="exportBtn" class="primary">Export PNG @2×</button>
  <span class="hint">paste screenshots • drag headers • right-drag to pan • Shift-click two to connect • autosaves locally</span>
</header>
<div id="viewport"><div id="stage"><div id="surface">
  <svg aria-hidden="true"><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0 0L0 6L9 3z" fill="#9aa4af" /></marker></defs><g id="links"></g></svg>
  <div id="nodes"></div><div id="empty" class="empty"><strong>Drop a journey in here.</strong><br>Paste or upload screenshots, add text, connect the steps,<br>then export a readable PNG for review.</div>
</div></div></div>
<div id="toast" class="toast"></div>
<script>
(() => {
  const DB = "benos_journey_board", STORE = "boards", LEGACY_KEY = "default", WORLD_W = 5000, WORLD_H = 3200;
  const $ = id => document.getElementById(id);
  const nodesEl=$("nodes"), linksEl=$("links"), viewport=$("viewport"), stage=$("stage"), surface=$("surface"), toast=$("toast");
  let state=null, journeys=[], selected=[], drag=null, pan=null, suppressClick=null, suppressSurfaceClick=false, savingTimer=null, zoom=1;

  const NOTE_COLORS = [
    {id:"default",name:"Slate",bg:"#11151b",bar:"#161c24",text:"#e6edf3",meta:"#9aa4af",border:"#243041",placeholder:"#9aa4af"},
    {id:"yellow",name:"Yellow",bg:"#fff3a3",bar:"#f7d957",text:"#27313d",meta:"#5f4f00",border:"#e5c448",placeholder:"#766a2f"},
    {id:"pink",name:"Pink",bg:"#ffd1dc",bar:"#f79ab2",text:"#3b1f2a",meta:"#6f2940",border:"#e6819d",placeholder:"#895166"},
    {id:"blue",name:"Blue",bg:"#c9ecff",bar:"#84cff5",text:"#163241",meta:"#1d5b78",border:"#70bde5",placeholder:"#4d7485"},
    {id:"green",name:"Green",bg:"#d5f7c8",bar:"#9be28b",text:"#1d341d",meta:"#346b32",border:"#83cf75",placeholder:"#587b52"},
    {id:"purple",name:"Purple",bg:"#ead9ff",bar:"#c6a1f5",text:"#2f2342",meta:"#644698",border:"#b38ce8",placeholder:"#735d8f"}
  ];

  function uid(){ return crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(16).slice(2) + Date.now().toString(16); }
  function blank(name="Untitled journey"){ return {id:`journey-${uid()}`, name, updatedAt:new Date().toISOString(), nodes:[], links:[], zoom:1}; }
  function show(msg){ toast.textContent=msg;toast.classList.add("show");clearTimeout(show.t);show.t=setTimeout(()=>toast.classList.remove("show"),1100); }
  function esc(s){ return String(s).replace(/[<>&"]/g,c=>({"<":"&lt;",">":"&gt;","&":"&amp;",'"':"&quot;"}[c])); }
  function noteTheme(id){ return NOTE_COLORS.find(c=>c.id===id) || NOTE_COLORS[0]; }
  function applyNoteTheme(el,node){ const c=noteTheme(node.color);el.style.setProperty("--note-bg",c.bg);el.style.setProperty("--note-bar",c.bar);el.style.setProperty("--note-text",c.text);el.style.setProperty("--note-meta",c.meta);el.style.setProperty("--note-border",c.border);el.style.setProperty("--note-placeholder",c.placeholder); }
  function noteSwatches(node){ return `<span class="swatches" aria-label="Note colour">${NOTE_COLORS.map(c=>`<button class="swatch${(node.color||"default")===c.id?" active":""}" data-act="color:${c.id}" title="${c.name}" aria-label="${c.name} note colour" style="background:${c.bg}"></button>`).join("")}</span>`; }
  function openDB(){ return new Promise((resolve,reject)=>{ const r=indexedDB.open(DB,1);r.onupgradeneeded=()=>{if(!r.result.objectStoreNames.contains(STORE)) r.result.createObjectStore(STORE);};r.onsuccess=()=>resolve(r.result);r.onerror=()=>reject(r.error); }); }
  async function getAll(){ const db=await openDB();return new Promise((resolve,reject)=>{const r=db.transaction(STORE).objectStore(STORE).getAll();r.onsuccess=()=>resolve(r.result||[]);r.onerror=()=>reject(r.error);}); }
  async function getKey(key){ const db=await openDB();return new Promise((resolve,reject)=>{const r=db.transaction(STORE).objectStore(STORE).get(key);r.onsuccess=()=>resolve(r.result);r.onerror=()=>reject(r.error);}); }
  async function put(board){ const db=await openDB();return new Promise((resolve,reject)=>{const tx=db.transaction(STORE,"readwrite");tx.objectStore(STORE).put(board,board.id);tx.oncomplete=resolve;tx.onerror=()=>reject(tx.error);}); }
  async function remove(key){ const db=await openDB();return new Promise((resolve,reject)=>{const tx=db.transaction(STORE,"readwrite");tx.objectStore(STORE).delete(key);tx.oncomplete=resolve;tx.onerror=()=>reject(tx.error);}); }
  async function initialise(){ const legacy=await getKey(LEGACY_KEY); if(legacy && Array.isArray(legacy.nodes)){ const imported={...legacy,id:`journey-${uid()}`,name:"Imported journey",updatedAt:new Date().toISOString(),zoom:1}; await put(imported); await remove(LEGACY_KEY); } journeys=(await getAll()).filter(j=>j && j.id && j.id!==LEGACY_KEY).sort((a,b)=>String(b.updatedAt).localeCompare(String(a.updatedAt))); if(!journeys.length){const first=blank();await put(first);journeys=[first];} await openJourney(journeys[0].id,false); }
  async function reloadJourneys(){ journeys=(await getAll()).filter(j=>j && j.id && j.id!==LEGACY_KEY).sort((a,b)=>String(b.updatedAt).localeCompare(String(a.updatedAt))); renderPicker(); }
  async function saveNow(){ if(!state) return; state.name=state.name.trim()||"Untitled journey";state.updatedAt=new Date().toISOString();state.zoom=zoom;await put(state);const existing=journeys.findIndex(j=>j.id===state.id);if(existing>=0) journeys[existing]={...state}; else journeys.unshift({...state});journeys.sort((a,b)=>String(b.updatedAt).localeCompare(String(a.updatedAt)));renderPicker(); }
  function queueSave(){ clearTimeout(savingTimer);savingTimer=setTimeout(()=>saveNow().catch(()=>show("Could not save journey")),100); }
  async function openJourney(id,saveCurrent=true){ if(saveCurrent && state) await saveNow(); const found=journeys.find(j=>j.id===id) || await getKey(id); if(!found) return; state=found; selected=[];zoom=Number(state.zoom)||1;$("boardName").value=state.name||"Untitled journey";renderPicker();applyZoom(zoom,false);render(); }
  function renderPicker(){ const select=$("journeySelect"),current=state?.id; select.innerHTML=""; for(const j of journeys){ const opt=document.createElement("option");opt.value=j.id;opt.textContent=j.name||"Untitled journey";opt.selected=j.id===current;select.appendChild(opt); } }

  function newPosition(){ const i=state.nodes.length;return{x:110+(i%5)*70,y:100+(i%6)*50}; }
  function readImage(file){ return new Promise((resolve,reject)=>{const r=new FileReader();r.onload=()=>{const img=new Image();img.onload=()=>resolve({data:r.result,naturalW:img.naturalWidth,naturalH:img.naturalHeight});img.onerror=reject;img.src=r.result;};r.onerror=reject;r.readAsDataURL(file);}); }
  async function addImage(file){ const image=await readImage(file),pos=newPosition(),w=Math.max(220,Math.min(440,image.naturalW));state.nodes.push({id:uid(),type:"image",name:file.name||"pasted screenshot",...pos,w,...image});queueSave();render(); }
  function addNote(){ const pos=newPosition(),node={id:uid(),type:"note",text:"",color:"yellow",...pos};state.nodes.push(node);selected=[node.id];queueSave();render();requestAnimationFrame(()=>nodeElement(node.id)?.querySelector("textarea")?.focus()); }
  function find(id){ return state.nodes.find(n=>n.id===id); }
  function nodeElement(id){ return nodesEl.querySelector(`[data-id="${id}"]`); }
  function dims(node){ const el=nodeElement(node.id);return{w:el?.offsetWidth||(node.type==="image"?node.w:260),h:el?.offsetHeight||(node.type==="image"?node.w*node.naturalH/node.naturalW+34:143)}; }
  function centre(node){ const d=dims(node);return{x:node.x+d.w/2,y:node.y+d.h/2}; }
  function linePath(a,b){ const dx=Math.max(55,Math.abs(b.x-a.x)*.42);return`M ${a.x} ${a.y} C ${a.x+dx} ${a.y}, ${b.x-dx} ${b.y}, ${b.x} ${b.y}`; }
  function drawLinks(){ linksEl.innerHTML="";for(const link of state.links){const from=find(link.from),to=find(link.to);if(!from||!to)continue;const a=centre(from),b=centre(to),path=document.createElementNS("http://www.w3.org/2000/svg","path");path.setAttribute("class","link");path.setAttribute("d",linePath(a,b));linksEl.appendChild(path);if(link.label){const label=document.createElementNS("http://www.w3.org/2000/svg","text");label.setAttribute("class","link-label");label.setAttribute("x",String((a.x+b.x)/2));label.setAttribute("y",String((a.y+b.y)/2-9));label.setAttribute("text-anchor","middle");label.textContent=link.label;linksEl.appendChild(label);}} }
  function render(){ nodesEl.innerHTML="";$("empty").style.display=state.nodes.length?"none":"block";for(const node of state.nodes){const el=document.createElement("article");el.dataset.id=node.id;el.className=`node ${node.type}${selected.includes(node.id)?" selected":""}`;el.style.left=`${node.x}px`;el.style.top=`${node.y}px`;if(node.type==="note")applyNoteTheme(el,node);const controls=node.type==="image"?`<button data-act="smaller">−</button><button data-act="larger">+</button>`:noteSwatches(node);el.innerHTML=`<div class="bar"><span class="name">${esc(node.type==="image"?node.name:"text note")}</span>${controls}<button data-act="delete">×</button></div>`;if(node.type==="image"){const img=document.createElement("img");img.src=node.data;img.alt=node.name;img.style.width=`${node.w}px`;el.appendChild(img);}else{const text=document.createElement("textarea");text.placeholder="Label, observation, decision…";text.value=node.text;text.addEventListener("input",()=>{node.text=text.value;queueSave();});el.appendChild(text);}nodesEl.appendChild(el);}drawLinks();updateSelection(); }
  function updateSelection(){ nodesEl.querySelectorAll(".node").forEach(el=>el.classList.toggle("selected",selected.includes(el.dataset.id))); }
  function select(id,multi=false){ selected=multi?(selected.includes(id)?selected.filter(x=>x!==id):[...selected,id]):[id];updateSelection(); }
  function point(e){ const rect=surface.getBoundingClientRect();return{x:(e.clientX-rect.left)/zoom,y:(e.clientY-rect.top)/zoom}; }
  function applyZoom(next,preserveCentre=true){ const before=preserveCentre?{x:(viewport.scrollLeft+viewport.clientWidth/2)/zoom,y:(viewport.scrollTop+viewport.clientHeight/2)/zoom}:null; zoom=Math.min(1.6,Math.max(.25,Math.round(next*100)/100));surface.style.transform=`scale(${zoom})`;stage.style.width=`${WORLD_W*zoom}px`;stage.style.height=`${WORLD_H*zoom}px`;$("zoomValue").textContent=`${Math.round(zoom*100)}%`;if(before){viewport.scrollLeft=before.x*zoom-viewport.clientWidth/2;viewport.scrollTop=before.y*zoom-viewport.clientHeight/2;}queueSave(); }
  function fitContent(){ if(!state.nodes.length) return applyZoom(1);const boxes=state.nodes.map(n=>({n,d:dims(n)})),minX=Math.min(...boxes.map(x=>x.n.x)),minY=Math.min(...boxes.map(x=>x.n.y)),maxX=Math.max(...boxes.map(x=>x.n.x+x.d.w)),maxY=Math.max(...boxes.map(x=>x.n.y+x.d.h)),availableW=viewport.clientWidth-80,availableH=viewport.clientHeight-80;applyZoom(Math.min(1,availableW/(maxX-minX),availableH/(maxY-minY)),false);viewport.scrollLeft=Math.max(0,minX*zoom-40);viewport.scrollTop=Math.max(0,minY*zoom-40); }

  nodesEl.addEventListener("pointerdown",e=>{const el=e.target.closest(".node"),bar=e.target.closest(".bar");if(!el||!bar||e.target.closest("button"))return;const node=find(el.dataset.id);if(!node)return;select(node.id,e.shiftKey);suppressClick=node.id;const p=point(e);drag={id:node.id,dx:p.x-node.x,dy:p.y-node.y,pointerId:e.pointerId};el.setPointerCapture(e.pointerId);});
  nodesEl.addEventListener("pointermove",e=>{if(!drag||e.pointerId!==drag.pointerId)return;const node=find(drag.id),p=point(e);node.x=Math.max(0,p.x-drag.dx);node.y=Math.max(0,p.y-drag.dy);const el=nodeElement(node.id);if(el){el.style.left=`${node.x}px`;el.style.top=`${node.y}px`;}queueSave();drawLinks();});
  nodesEl.addEventListener("pointerup",()=>{drag=null;});
  nodesEl.addEventListener("click",e=>{const el=e.target.closest(".node");if(!el)return;const node=find(el.dataset.id),action=e.target.closest("button")?.dataset.act;if(!action){if(suppressClick===node.id){suppressClick=null;return;}if(!e.target.matches("textarea"))select(node.id,e.shiftKey);return;}if(action==="delete"){state.nodes=state.nodes.filter(n=>n.id!==node.id);state.links=state.links.filter(l=>l.from!==node.id&&l.to!==node.id);selected=selected.filter(id=>id!==node.id);}if(action==="smaller")node.w=Math.max(160,node.w-60);if(action==="larger")node.w=Math.min(1000,node.w+60);if(action.startsWith("color:")&&node.type==="note")node.color=action.slice(6);queueSave();render();});
  viewport.addEventListener("pointerdown",e=>{if(e.button!==2)return;pan={pointerId:e.pointerId,x:e.clientX,y:e.clientY,left:viewport.scrollLeft,top:viewport.scrollTop,moved:false};viewport.classList.add("panning");viewport.setPointerCapture(e.pointerId);e.preventDefault();});
  viewport.addEventListener("pointermove",e=>{if(!pan||e.pointerId!==pan.pointerId)return;const dx=e.clientX-pan.x,dy=e.clientY-pan.y;if(Math.abs(dx)>3||Math.abs(dy)>3)pan.moved=true;viewport.scrollLeft=pan.left-dx;viewport.scrollTop=pan.top-dy;});
  function stopPan(e){ if(!pan||e.pointerId!==pan.pointerId)return;suppressSurfaceClick=e.type==="pointerup"&&pan.moved;pan=null;viewport.classList.remove("panning"); }
  viewport.addEventListener("pointerup",stopPan);
  viewport.addEventListener("pointercancel",stopPan);
  viewport.addEventListener("contextmenu",e=>{if(pan||suppressSurfaceClick)e.preventDefault();});
  surface.addEventListener("click",e=>{if(suppressSurfaceClick){suppressSurfaceClick=false;return;}if(e.target===surface||e.target.tagName.toLowerCase()==="svg"){selected=[];updateSelection();}});

  $("journeySelect").addEventListener("change",e=>openJourney(e.target.value).catch(()=>show("Could not load journey")));
  $("boardName").addEventListener("input",e=>{state.name=e.target.value;queueSave();renderPicker();});
  $("newBtn").addEventListener("click",async()=>{await saveNow();state=blank();journeys.unshift(state);selected=[];zoom=1;await saveNow();$("boardName").value=state.name;applyZoom(1,false);render();show("New journey created");});
  $("duplicateBtn").addEventListener("click",async()=>{await saveNow();state={...structuredClone(state),id:`journey-${uid()}`,name:`${state.name} (copy)`,updatedAt:new Date().toISOString()};journeys.unshift(state);selected=[];await saveNow();$("boardName").value=state.name;render();show("Journey duplicated");});
  $("deleteJourneyBtn").addEventListener("click",async()=>{if(!confirm(`Delete “${state.name||"Untitled journey"}”? No undo.`))return;await remove(state.id);journeys=journeys.filter(j=>j.id!==state.id);if(!journeys.length){const first=blank();journeys=[first];await put(first);}await openJourney(journeys[0].id,false);show("Journey deleted");});
  $("connectBtn").addEventListener("click",()=>{if(selected.length!==2)return show("Shift-click exactly two items first");const label=prompt("Connector label (optional)","")||"";state.links.push({id:uid(),from:selected[0],to:selected[1],label});selected=[];queueSave();render();});
  $("textBtn").addEventListener("click",addNote);
  $("file").addEventListener("change",async e=>{for(const file of [...e.target.files])await addImage(file);e.target.value="";show("Screenshot added");});
  document.addEventListener("paste",async e=>{if(e.target.matches("textarea,input"))return;const files=[...(e.clipboardData?.items||[])].filter(i=>i.kind==="file"&&i.type.startsWith("image/")).map(i=>i.getAsFile());for(const file of files)await addImage(file);if(files.length){e.preventDefault();show(`${files.length} screenshot${files.length===1?"":"s"} pasted`);}});
  $("zoomOut").addEventListener("click",()=>applyZoom(zoom-.1));$("zoomIn").addEventListener("click",()=>applyZoom(zoom+.1));$("fitBtn").addEventListener("click",fitContent);
  viewport.addEventListener("wheel",e=>{if(!e.ctrlKey&&!e.metaKey)return;e.preventDefault();applyZoom(zoom+(e.deltaY<0?.1:-.1));},{passive:false});
  document.addEventListener("keydown",e=>{if(e.key==="Escape"){selected=[];updateSelection();}if((e.key==="Delete"||e.key==="Backspace")&&!e.target.matches("textarea,input")&&selected.length){state.nodes=state.nodes.filter(n=>!selected.includes(n.id));state.links=state.links.filter(l=>!selected.includes(l.from)&&!selected.includes(l.to));selected=[];queueSave();render();}});

  function wrapText(ctx,text,maxWidth){const lines=[];for(const para of String(text||"").split("\n")){let line="";for(const word of para.split(/\s+/)){const next=line?`${line} ${word}`:word;if(line&&ctx.measureText(next).width>maxWidth){lines.push(line);line=word;}else line=next;}lines.push(line);}return lines;}
  function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
  function arrow(ctx,a,b){const dx=Math.max(55,Math.abs(b.x-a.x)*.42),c1={x:a.x+dx,y:a.y},c2={x:b.x-dx,y:b.y};ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.bezierCurveTo(c1.x,c1.y,c2.x,c2.y,b.x,b.y);ctx.stroke();const angle=Math.atan2(b.y-c2.y,b.x-c2.x);ctx.beginPath();ctx.moveTo(b.x,b.y);ctx.lineTo(b.x-11*Math.cos(angle-.38),b.y-11*Math.sin(angle-.38));ctx.lineTo(b.x-11*Math.cos(angle+.38),b.y-11*Math.sin(angle+.38));ctx.closePath();ctx.fill();}
  async function exportPNG(){if(!state.nodes.length)return show("Add something first");const margin=55,scale=2,boxes=state.nodes.map(n=>({n,d:dims(n)})),minX=Math.min(...boxes.map(x=>x.n.x))-margin,minY=Math.min(...boxes.map(x=>x.n.y))-margin,maxX=Math.max(...boxes.map(x=>x.n.x+x.d.w))+margin,maxY=Math.max(...boxes.map(x=>x.n.y+x.d.h))+margin,canvas=document.createElement("canvas");canvas.width=Math.ceil((maxX-minX)*scale);canvas.height=Math.ceil((maxY-minY)*scale);const ctx=canvas.getContext("2d");ctx.scale(scale,scale);ctx.translate(-minX,-minY);ctx.fillStyle="#fbfaf7";ctx.fillRect(minX,minY,maxX-minX,maxY-minY);ctx.strokeStyle="#8793a0";ctx.fillStyle="#8793a0";ctx.lineWidth=2;for(const l of state.links){const a=find(l.from),b=find(l.to);if(!a||!b)continue;const ca=centre(a),cb=centre(b);arrow(ctx,ca,cb);if(l.label){ctx.font="13px Arial";const x=(ca.x+cb.x)/2,y=(ca.y+cb.y)/2-10,w=ctx.measureText(l.label).width;ctx.fillStyle="#fbfaf7";ctx.fillRect(x-w/2-5,y-14,w+10,19);ctx.fillStyle="#26323d";ctx.textAlign="center";ctx.fillText(l.label,x,y);ctx.textAlign="start";ctx.fillStyle="#8793a0";}}for(const {n,d} of boxes){const c=n.type==="note"?noteTheme(n.color):null;ctx.fillStyle=c?c.bg:"#fff";ctx.strokeStyle=c?c.border:"#d7d3ca";ctx.lineWidth=1;roundRect(ctx,n.x,n.y,d.w,d.h,10);ctx.fill();ctx.stroke();ctx.fillStyle=c?c.bar:"#f4f2ed";roundRect(ctx,n.x,n.y,d.w,34,10);ctx.fill();ctx.fillRect(n.x,n.y+24,d.w,10);ctx.fillStyle=c?c.meta:"#6b7280";ctx.font="12px monospace";ctx.fillText(n.type==="image"?n.name:"text note",n.x+10,n.y+22);if(n.type==="image"){const img=new Image();await new Promise(resolve=>{img.onload=resolve;img.onerror=resolve;img.src=n.data;});ctx.drawImage(img,n.x,n.y+34,n.w,d.h-34);}else{ctx.fillStyle=c?c.text:"#1d2935";ctx.font="13px monospace";wrapText(ctx,n.text,d.w-20).slice(0,8).forEach((line,i)=>ctx.fillText(line,n.x+10,n.y+56+i*18));}}canvas.toBlob(blob=>{if(!blob)return show("Export failed");const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`${(state.name||"journey-board").toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"")||"journey-board"}.png`;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1500);show("High-res PNG exported");},"image/png");}
  $("exportBtn").addEventListener("click",exportPNG);
  initialise().catch(()=>{state=blank();journeys=[state];$("boardName").value=state.name;renderPicker();render();show("Could not load saved journeys");});
})();
</script>
